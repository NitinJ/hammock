name: e2e

# Stage 16. PR-trigger on backend or frontend integration paths; nightly
# full run on main. The Stage 16 lifecycle test is a backend-only end-to-
# end (TestClient + spawn_driver + FakeStageRunner). Frontend Playwright
# is deferred to v1+ and not wired here.

on:
  push:
    branches: [main]
    paths:
      - "shared/**"
      - "dashboard/**"
      - "job_driver/**"
      - "cli/**"
      - "tests/e2e/**"
      - "tests/fixtures/**"
      - "hammock/templates/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "shared/**"
      - "dashboard/**"
      - "job_driver/**"
      - "cli/**"
      - "tests/e2e/**"
      - "tests/fixtures/**"
      - "hammock/templates/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/e2e.yml"
  schedule:
    # Nightly full run at 06:00 UTC.
    - cron: "0 6 * * *"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --dev --python ${{ matrix.python-version }}

      - name: Run e2e suite
        run: uv run pytest tests/e2e/ -q
