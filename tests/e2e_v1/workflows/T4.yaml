schema_version: 1
workflow: t4-with-pr-merge-loop

# T4: T3 + wrap implement + pr-review-hil in an `until` loop. Tests:
#   - until-loop primitive with required max_iterations
#   - substrate `shared` (one stage branch reused across iterations)
#   - loop indexing: $loop-id.var[i] inside the loop body
#   - pr-review-verdict type with real GitHub merge verification

variables:
  request:                   { type: job-request }
  bug_report:                { type: bug-report }
  design_spec:               { type: design-spec }
  design_spec_review_agent:  { type: review-verdict }
  design_spec_review_human:  { type: review-verdict }
  pr:                        { type: pr }
  pr_review:                  { type: pr-review-verdict }

nodes:
  - id: write-bug-report
    kind: artifact
    actor: agent
    inputs:
      request: $request
    outputs:
      bug_report: $bug_report

  - id: write-design-spec
    kind: artifact
    actor: agent
    after: [write-bug-report]
    inputs:
      bug_report: $bug_report
    outputs:
      design_spec: $design_spec

  - id: review-design-spec-agent
    kind: artifact
    actor: agent
    after: [write-design-spec]
    inputs:
      design_spec: $design_spec
    outputs:
      verdict: $design_spec_review_agent

  - id: review-design-spec-human
    kind: artifact
    actor: human
    after: [review-design-spec-agent]
    inputs:
      design_spec: $design_spec
      agent_verdict: $design_spec_review_agent
    outputs:
      verdict: $design_spec_review_human
    presentation:
      title: "Review the design spec"

  - id: pr-merged-loop
    kind: loop
    after: [review-design-spec-human]
    until: $pr-merged-loop.pr_review[i].verdict == 'merged'
    max_iterations: 3
    substrate: shared
    body:
      - id: implement
        kind: code
        actor: agent
        inputs:
          design_spec: $design_spec
        outputs:
          pr: $pr

      - id: pr-review-hil
        kind: artifact
        actor: human
        inputs:
          pr: $pr-merged-loop.pr[i]
        outputs:
          pr_review: $pr_review
        presentation:
          title: "Merge the PR on GitHub, then submit pr_url"
    outputs: {}
