schema_version: 1
workflow: t1-basic-artifact

# T1: simplest possible workflow. Three artifact + agent nodes in a
# straight line. No loops, no HIL, no code substrate. Tests basic
# dispatch, variable production, persistence, validator on a trivial DAG.

variables:
  request:                   { type: job-request }
  bug_report:                { type: bug-report }
  design_spec:               { type: design-spec }
  design_spec_review_agent:  { type: review-verdict }

nodes:
  - id: write-bug-report
    kind: artifact
    actor: agent
    inputs:
      request: $request
    outputs:
      bug_report: $bug_report

  - id: write-design-spec
    kind: artifact
    actor: agent
    after: [write-bug-report]
    inputs:
      bug_report: $bug_report
    outputs:
      design_spec: $design_spec

  - id: review-design-spec-agent
    kind: artifact
    actor: agent
    after: [write-design-spec]
    inputs:
      design_spec: $design_spec
    outputs:
      verdict: $design_spec_review_agent
